version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "admin"
      RABBITMQ_DEFAULT_PASS: "password123"
    volumes:
      - ./data:/var/lib/rabbitmq
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: asouza2703
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  volumes:
    pgdata:
